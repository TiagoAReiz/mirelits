<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>mirelits — portfólio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    /* default palette — overridden at runtime by the artist's settings */
    --bg:        oklch(0.984 0.006 85);
    --paper:     oklch(1 0 0);
    --ink:       oklch(0.215 0.012 65);
    --ink-soft:  oklch(0.46 0.012 65);
    --ink-faint: oklch(0.66 0.010 65);
    --line:      oklch(0.90 0.008 75);
    --line-soft: oklch(0.945 0.006 80);
    --acc-1:     oklch(0.685 0.175 45);   /* orange */
    --acc-2:     oklch(0.66 0.135 158);   /* green  */
    --acc-3:     oklch(0.555 0.16 295);   /* purple */
    --acc-1-ink: oklch(0.40 0.13 45);

    --ff-display: "Newsreader", Georgia, serif;
    --ff-body:    "Hanken Grotesk", system-ui, sans-serif;
    --ff-mono:    "Space Mono", ui-monospace, monospace;

    --maxw: 1280px;
    --gut: clamp(16px, 4vw, 40px);
    --radius: 4px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--ff-body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  img { display: block; max-width: 100%; }

  /* ---------- shared atoms ---------- */
  .mono { font-family: var(--ff-mono); }
  .label {
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .serif { font-family: var(--ff-display); font-weight: 400; }
  .ital { font-style: italic; }

  ::selection { background: color-mix(in oklch, var(--acc-1) 30%, transparent); }

  /* buttons */
  .btn {
    font-family: var(--ff-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    padding: 11px 18px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform .15s ease, background .2s ease, color .2s ease, border-color .2s ease;
    white-space: nowrap;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn--ghost { background: transparent; color: var(--ink); }
  .btn--ghost:hover { background: var(--ink); color: var(--bg); }
  .btn--accent { background: var(--acc-1); border-color: var(--acc-1); color: oklch(1 0 0); }
  .btn--sm { padding: 8px 13px; font-size: 11px; }

  .field {
    font-family: var(--ff-body);
    font-size: 15px;
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 13px 14px;
    color: var(--ink);
    transition: border-color .18s ease, box-shadow .18s ease;
  }
  .field:focus {
    outline: none;
    border-color: var(--acc-1);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--acc-1) 18%, transparent);
  }
  textarea.field { resize: vertical; min-height: 120px; line-height: 1.5; }

  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  /* page container */
  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding-inline: var(--gut); }

  /* fade-in on route mount — transform-only so the rest state is always visible
     even if rAF/animations are paused (hidden iframe, print, reduced-motion) */
  @keyframes riseIn { from { transform: translateY(10px); } to { transform: none; } }
  .route { animation: riseIn .45s cubic-bezier(.2,.7,.2,1) both; flex: 1; }

  /* scrollbar for horizontal timeline */
  .hscroll { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .hscroll::-webkit-scrollbar { height: 8px; }
  .hscroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

  /* placeholder canvas (stand-in for the artist's real artwork) */
  .ph {
    position: relative;
    overflow: hidden;
    background: var(--ph-base, oklch(0.9 0.04 60));
    isolation: isolate;
  }
  .ph::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      var(--ph-angle, 135deg),
      transparent 0 9px,
      color-mix(in oklch, var(--ph-stripe, #000) 7%, transparent) 9px 10px
    );
    z-index: 0;
  }
  .ph::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 30% 15%, color-mix(in oklch, white 22%, transparent), transparent 60%);
    z-index: 0;
  }
  .ph > .ph-cap {
    position: absolute; left: 10px; bottom: 9px; z-index: 1;
    font-family: var(--ff-mono); font-size: 10px; letter-spacing: .1em;
    text-transform: uppercase; color: color-mix(in oklch, var(--ph-stripe, #000) 70%, transparent);
    background: color-mix(in oklch, white 55%, transparent);
    padding: 2px 6px; border-radius: 2px; backdrop-filter: blur(2px);
  }

  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }

  @media (prefers-reduced-motion: reduce) {
    .route { animation: none; }
    * { scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="store.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="public.jsx"></script>
  <script type="text/babel" src="admin.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
